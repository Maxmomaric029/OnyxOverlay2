name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Limpiar www para asegurar frescura
          rm -rf www/*
          cp index.html script.js styles.js styles.css www/ 2>/dev/null || true
          # Copiar imágenes y sonidos si existen
          cp *.png *.jpg *.jpeg *.mp3 *.cer *.js www/ 2>/dev/null || true

      - name: Build Android Project
        run: |
          # Eliminar carpeta android si existe para evitar conflictos
          rm -rf android/
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnyxOverlay-Debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
